# .github/workflows/diag-xai-v2-smoke.yml
name: diag-xai-v2 smoke

on:
  workflow_dispatch: {}
  schedule:
    - cron: "15 16 * * *"

permissions:
  contents: read

concurrency:
  group: diag-xai-v2-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Preflight (skip if not configured)
        id: preflight
        shell: bash
        env:
          DIAG_URL: ${{ secrets.TABARNAM_DIAG_XAI_V2_URL }}
          FUNCTION_KEY: ${{ secrets.TABARNAM_FUNCTION_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${DIAG_URL:-}" ]; then
            echo "diag-xai-v2 smoke: skipping (TABARNAM_DIAG_XAI_V2_URL not set)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # FUNCTION_KEY is optional. Some endpoints are public; some require ?code=
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Call diag-xai-v2
        if: steps.preflight.outputs.skip != 'true'
        shell: bash
        env:
          DIAG_URL: ${{ secrets.TABARNAM_DIAG_XAI_V2_URL }}
          FUNCTION_KEY: ${{ secrets.TABARNAM_FUNCTION_KEY }}
        run: |
          set -euo pipefail

          url="$DIAG_URL"
          if [ -n "${FUNCTION_KEY:-}" ]; then
            if [[ "$url" == *\?* ]]; then
              url="${url}&code=${FUNCTION_KEY}"
            else
              url="${url}?code=${FUNCTION_KEY}"
            fi
          fi

          # Retry generously so transient blips don't burn a red ❌ on the
          # daily scheduled run. --retry-all-errors covers timeouts, not just
          # HTTP 5xx.
          curl -fsS \
            --max-time 30 \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            "$url" \
            -o resp.json
          cat resp.json

          python - << 'PY'
          import json, sys

          j = json.load(open("resp.json"))
          smoke = j.get("smoke") or {}
          status = smoke.get("status")
          detail = smoke.get("detail", "")

          # PASS: tabarnam endpoint healthy, xAI returned 200.
          if j.get("ok") is True and smoke.get("ok") is True and status == 200:
              print("PASS: diag/xai-v2 smoke ok")
              sys.exit(0)

          # SOFT-PASS: upstream xAI returned 5xx (overloaded / rate-limited /
          # temporarily down). Tabarnam itself is fine. Surface a workflow
          # warning instead of failing — the daily smoke shouldn't go red
          # because xAI had a bad minute. If xAI is broken for hours, the
          # repeated warnings make the pattern obvious without poisoning the
          # actions feed.
          if isinstance(status, int) and 500 <= status < 600 and detail == "non_2xx_response":
              print(f"::warning::Upstream xAI returned HTTP {status} ({smoke.get('message','no message')}). "
                    f"Tabarnam diag endpoint is responding correctly; this is an external dependency hiccup.")
              print("SOFT-PASS: external upstream issue, not a tabarnam regression.")
              sys.exit(0)

          # HARD-FAIL: real regression — config missing, route broken, payload malformed.
          print(f"FAIL: diag/xai-v2 smoke returned unexpected payload.")
          print(f"  ok={j.get('ok')}, smoke.ok={smoke.get('ok')}, status={status}, detail={detail}")
          print(f"  full response: {json.dumps(j)}")
          sys.exit(1)
          PY
