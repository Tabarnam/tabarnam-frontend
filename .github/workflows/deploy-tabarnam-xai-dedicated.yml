# .github/workflows/deploy-tabarnam-xai-dedicated.yml
name: Deploy tabarnam-xai-dedicated

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "scripts/**"
      - ".github/workflows/deploy-tabarnam-xai-dedicated.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-tabarnam-xai-dedicated
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert package root (api/)
        shell: bash
        run: |
          set -euo pipefail
          test -f api/host.json
          test -d api/diag
          echo "api/ package root looks correct"

      - name: Write build id files
        run: node scripts/write-build-id.mjs

      - name: Write deploy stamp file
        shell: bash
        run: |
          set -euo pipefail
          node -e "const fs=require('node:fs'); const stamp={sha:process.env.GITHUB_SHA||'', run_id:process.env.GITHUB_RUN_ID||'', run_number:process.env.GITHUB_RUN_NUMBER||'', ts:new Date().toISOString()}; fs.writeFileSync('api/__deploy_stamp.json', JSON.stringify(stamp)+'\n', 'utf8'); console.log('[deploy-stamp]', JSON.stringify(stamp));"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install API dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd api
          npm ci --omit=dev || npm install --omit=dev
          echo "node_modules installed:"
          ls -la node_modules | head -20 || true

      # Azure Login using Service Principal (Flex Consumption doesn't support publish profiles)
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy tabarnam-xai-dedicated
        uses: Azure/functions-action@v1
        with:
          app-name: tabarnam-xai-dedicated
          package: api
          # No publish-profile needed - uses Azure Login credentials

      - name: Validate dedicated diag endpoint
        shell: bash
        run: |
          set -euo pipefail

          URL="${TABARNAM_DIAG_XAI_V2_URL:-}"

          if [ -z "$URL" ]; then
            echo "ERROR: TABARNAM_DIAG_XAI_V2_URL is not set"
            exit 1
          fi

          case "$URL" in
            https://*.azurewebsites.net/api/diag*)
              echo "Using dedicated diag endpoint: $URL"
              ;;
            *)
              echo "ERROR: TABARNAM_DIAG_XAI_V2_URL does not point to the dedicated Functions host"
              echo "Value: $URL"
              exit 1
              ;;
          esac
        env:
          TABARNAM_DIAG_XAI_V2_URL: ${{ secrets.TABARNAM_DIAG_XAI_V2_URL }}

      - name: Smoke test xAI endpoint (dedicated only)
        shell: bash
        run: |
          set -euo pipefail

          url="${TABARNAM_DIAG_XAI_V2_URL}"
          if [ -n "${TABARNAM_FUNCTION_KEY:-}" ]; then
            if echo "$url" | grep -q '\?'; then
              url="${url}&code=${TABARNAM_FUNCTION_KEY}"
            else
              url="${url}?code=${TABARNAM_FUNCTION_KEY}"
            fi
          fi

          echo "GET $url"
          # --retry-all-errors so timeouts get retried (default --retry only
          # covers 408/429/500/502/503/504 — not connection timeouts).
          # Generous --max-time and 5 attempts absorb transient blips before
          # we conclude something's wrong.
          curl -fsS \
            --max-time 30 \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            "$url" \
            -o resp.json

          cat resp.json

          python - << 'PY'
          import json, sys, os

          j = json.load(open("resp.json"))
          smoke = j.get("smoke") or {}
          status = smoke.get("status")
          detail = smoke.get("detail", "")

          # PASS: real success — endpoint healthy, xAI returned 200.
          if j.get("ok") is True and smoke.get("ok") is True and status == 200:
              print("PASS: diag/xai-v2 smoke ok")
              sys.exit(0)

          # SOFT-PASS: upstream xAI returned 5xx (overloaded / rate-limited /
          # temporarily down). Tabarnam itself is fine — the diag endpoint
          # responded correctly with the upstream error tagged as
          # detail=non_2xx_response. Surface a workflow warning instead of
          # failing the deploy. If xAI is genuinely broken for hours, the
          # warning shows up on every run and we'll see the pattern; we just
          # don't burn a red ❌ on every deploy when the external service
          # has a bad minute.
          if isinstance(status, int) and 500 <= status < 600 and detail == "non_2xx_response":
              print(f"::warning::Upstream xAI returned HTTP {status} ({smoke.get('message','no message')}). "
                    f"Tabarnam deploy is fine; this is an external dependency hiccup.")
              print("SOFT-PASS: marking smoke as warning, not failure (upstream-only issue).")
              sys.exit(0)

          # HARD-FAIL: anything else — config missing, route broken, response
          # malformed, etc. These are real regressions that need attention.
          print(f"FAIL: diag/xai-v2 smoke returned an unexpected payload.")
          print(f"  ok={j.get('ok')}, smoke.ok={smoke.get('ok')}, status={status}, detail={detail}")
          print(f"  full response: {json.dumps(j)}")
          sys.exit(1)
          PY
        env:
          TABARNAM_DIAG_XAI_V2_URL: ${{ secrets.TABARNAM_DIAG_XAI_V2_URL }}
          TABARNAM_FUNCTION_KEY: ${{ secrets.TABARNAM_FUNCTION_KEY }}
